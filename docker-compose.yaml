services:
    app:
        build: 
            context: .
            dockerfile: Dockerfile
        container_name: pet
        user: root
        restart: always
        depends_on:
            - pgdb
            - redis
        env_file:
            - .env
        working_dir: /var/www/
        volumes:
            - .:/var/www
        networks:
            - pet

    pgdb:
        image: postgres:latest
        container_name: pgdb
        restart: always
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${PGDB_PORT}:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - pet

    nginx:
        image: nginx:latest
        container_name: nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT}:80"
            - "443:443"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - /etc/letsencrypt:/etc/letsencrypt:ro
        depends_on:
            - app
        networks:
            - pet

    redis:
        image: redis:latest
        container_name: redis
        restart: always
        networks:
            - pet

# ВАЖНО: Эти блоки должны быть в самом конце и без отступов!
volumes:
    pgdata:

networks:
    pet:
        driver: bridge
